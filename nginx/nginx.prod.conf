worker_processes auto;
events { worker_connections 1024; multi_accept on; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on; tcp_nopush on; tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on; gzip_vary on; gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 16; }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        location / { return 301 https://$host$request_uri; }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name repolens.ai www.repolens.ai;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;

        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /docs  { proxy_pass http://backend; proxy_set_header Host $host; }
        location /redoc { proxy_pass http://backend; proxy_set_header Host $host; }

        location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
            proxy_pass http://frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }
    }

    # Local dev (no SSL)
    server {
        listen 80;
        server_name localhost 127.0.0.1;
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
