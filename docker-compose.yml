version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: repolens_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repolens123}
      POSTGRES_DB: ${POSTGRES_DB:-repolensdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repolens"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Celery Broker + Cache) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: repolens_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── ChromaDB (Vector Database) ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: repolens_chromadb
    restart: always
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_FILE=/chroma/auth
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── MinIO (File Storage - S3 compatible) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: repolens_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repolens_backend
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens123}@postgres:5432/${POSTGRES_DB:-repolensdb}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./backend:/app
      - ./vector_store:/app/vector_store
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload

  # ─── Celery Worker ─────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repolens_celery
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens123}@postgres:5432/${POSTGRES_DB:-repolensdb}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
      - ./vector_store:/app/vector_store
    depends_on:
      - backend
      - redis
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2

  # ─── React Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repolens_frontend
    restart: always
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: repolens_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  minio_data:
